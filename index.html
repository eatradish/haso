<style>
  /* 基础复位：消除外边距，防止出现多余的滚动条 */
  body {
    margin: 0;
    padding: 0;
    background-color: #fec5fb;
    /* 保持与导航栏一致的背景色 */
  }

  /* 让整个表格自适应屏幕宽度，且最大不超过原设计的 1920px */
  .adaptive-table {
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
    /* 居中显示 */
    table-layout: fixed;
    /* 固定布局，防止单元格被内容撑变形 */
  }

  /* 让图片、视频根据父级宽度 100% 自动缩放，高度自适应 */
  .adaptive-table img,
  .adaptive-table video {
    display: block;
    width: 100% !important;
    height: auto !important;
  }

  /* 导航栏单元格的文字大小也应该根据屏幕稍微自适应 */
  .nav-cell {
    font-size: 1.1vw;
    /* 使用视口宽度单位 */
  }

  @media (max-width: 768px) {
    .nav-cell {
      font-size: 12px;
    }

    /* 手机端防止字太小 */
  }

  /* 每一个包含点击区域的图片容器 */
  .image-container {
    position: relative;
    /* 核心：让子元素相对它进行绝对定位 */
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
  }

  /* 让容器内的图片自适应伸缩 */
  .image-container img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* 现代点击热区：透明的链接层 */
  .hotspot {
    position: absolute;
    /* border: 2px solid red; */
    /* 🛠 提示：如果位置不准，取消这行注释就能看见红框，方便微调 */
    text-decoration: none;
    cursor: pointer;
    z-index: 10;
  }

  /* 鼠标悬停时的现代微互动效果 */
  .hotspot:hover {
    background-color: rgba(255, 255, 255, 0.15);
    /* 鼠标移上去隐约有个亮块反馈 */
    transition: background-color 0.2s ease;
  }

  /* 回到顶部按钮的固定悬浮样式（专为你的胶囊图片定制） */
  .back-to-top {
    position: fixed;
    bottom: 40px;
    right: 40px;

    /* 核心修改：根据你的原图比例（2:1），设定完美的现代高宽 */
    width: 80px;
    /* 宽度 */
    height: 40px;
    /* 高度 */

    /* 引入你的原图 */
    background-image: url('images/回到顶部1.png');
    /* ⚠️ 请确保图片放到了 images 文件夹，名字和这里一致 */
    background-size: contain;
    /* 让整张图片完美缩放填满格子，不裁剪、不拉伸 */
    background-repeat: no-repeat;
    /* 防止图片重复 */
    background-position: center;
    /* 居中对齐 */

    /* 彻底删除了之前的 border-radius: 50%，保留图片原本完美的左圆角 */

    /* 加一个精致轻薄的阴影，让长条按钮浮起来，更有质感 */
    box-shadow: 0 4px 15px rgba(254, 197, 251, 0.4);

    text-decoration: none;
    z-index: 999;
    cursor: pointer;

    /* 隐藏与显示动画 */
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
  }

  /* 悬浮交互：鼠标放上去时微微上浮，并且加大一点粉色霓虹高光 */
  .back-to-top:hover {
    transform: translateY(-4px);
    /* 向上微动 4px */
    box-shadow: 0 8px 20px rgba(254, 197, 251, 0.7);
    /* 阴影变亮，像在发光 */
    filter: brightness(1.05);
    /* 鼠标移上去时，图片整体微微变亮一点点，互动感极强 */
  }

  /* 当页面下滑时，由 JS 加上这个类名来显示按钮 */
  .back-to-top.show {
    opacity: 1;
    pointer-events: auto;
  }
</style>

  <script>
    const backToTopBtn = document.getElementById('backToTop');

    // 监听网页滚动事件
    window.addEventListener('scroll', () => {
      // 当页面向下滚动超过 400 像素时，显示按钮；否则隐藏
      if (window.scrollY > 400) {
        backToTopBtn.classList.add('show');
      } else {
        backToTopBtn.classList.remove('show');
      }
    });

    // 点击按钮时的平滑滚动效果
    backToTopBtn.addEventListener('click', (e) => {
      e.preventDefault(); // 阻止默认的链接跳转行为
      window.scrollTo({
        top: 0,
        behavior: 'smooth' // 丝滑滚动回顶部
      });
    });
  </script>

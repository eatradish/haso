<style>
  /* 基础复位：消除外边距，防止出现多余的滚动条 */
  body {
    margin: 0;
    padding: 0;
    background-color: #fec5fb;
    /* 保持与导航栏一致的背景色 */
  }

  /* 让整个表格自适应屏幕宽度，且最大不超过原设计的 1920px */
  .adaptive-table {
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
    /* 居中显示 */
    table-layout: fixed;
    /* 固定布局，防止单元格被内容撑变形 */
  }

  /* 让图片、视频根据父级宽度 100% 自动缩放，高度自适应 */
  .adaptive-table img,
  .adaptive-table video {
    display: block;
    width: 100% !important;
    height: auto !important;
  }

  /* 导航栏单元格的文字大小也应该根据屏幕稍微自适应 */
  .nav-cell {
    font-size: 1.1vw;
    /* 使用视口宽度单位 */
  }

  @media (max-width: 768px) {
    .nav-cell {
      font-size: 12px;
    }

    /* 手机端防止字太小 */
  }

  /* 每一个包含点击区域的图片容器 */
  .image-container {
    position: relative;
    /* 核心：让子元素相对它进行绝对定位 */
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
  }

  /* 让容器内的图片自适应伸缩 */
  .image-container img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* 现代点击热区：透明的链接层 */
  .hotspot {
    position: absolute;
    /* border: 2px solid red; */
    /* 🛠 提示：如果位置不准，取消这行注释就能看见红框，方便微调 */
    text-decoration: none;
    cursor: pointer;
    z-index: 10;
  }

  /* 鼠标悬停时的现代微互动效果 */
  .hotspot:hover {
    background-color: rgba(255, 255, 255, 0.15);
    /* 鼠标移上去隐约有个亮块反馈 */
    transition: background-color 0.2s ease;
  }
</style>

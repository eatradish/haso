<style>
  /* 基础复位：消除外边距，防止出现多余的滚动条 */
  body {
    margin: 0;
    padding: 0;
    background-color: #fec5fb;
    /* 保持与导航栏一致的背景色 */
  }

  /* 让整个表格自适应屏幕宽度，且最大不超过原设计的 1920px */
  .adaptive-table {
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
    /* 居中显示 */
    table-layout: fixed;
    /* 固定布局，防止单元格被内容撑变形 */
  }

  /* 让图片、视频根据父级宽度 100% 自动缩放，高度自适应 */
  .adaptive-table img,
  .adaptive-table video {
    display: block;
    width: 100% !important;
    height: auto !important;
  }

  /* 导航栏单元格的文字大小也应该根据屏幕稍微自适应 */
  .nav-cell {
    font-size: 1.1vw;
    /* 使用视口宽度单位 */
  }

  @media (max-width: 768px) {
    .nav-cell {
      font-size: 12px;
    }

    /* 手机端防止字太小 */
  }

  /* 每一个包含点击区域的图片容器 */
  .image-container {
    position: relative;
    /* 核心：让子元素相对它进行绝对定位 */
    width: 100%;
    max-width: 1920px;
    margin: 0 auto;
  }

  /* 让容器内的图片自适应伸缩 */
  .image-container img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* 现代点击热区：透明的链接层 */
  .hotspot {
    position: absolute;
    /* border: 2px solid red; */
    /* 🛠 提示：如果位置不准，取消这行注释就能看见红框，方便微调 */
    text-decoration: none;
    cursor: pointer;
    z-index: 10;
  }

  /* 鼠标悬停时的现代微互动效果 */
  .hotspot:hover {
    background-color: rgba(255, 255, 255, 0.15);
    /* 鼠标移上去隐约有个亮块反馈 */
    transition: background-color 0.2s ease;
  }

  /* 回到顶部按钮（靠右侧边缘半卡片设计） */
  .back-to-top {
    position: fixed;
    bottom: 120px;
    /* 距离底部高度，可以自行上下调节 */
    right: 0;
    /* 🛠️ 核心：设置为 0，让它死死贴住网页最右侧边缘 */

    /* 大小尺寸，你可以根据视觉效果随意放大缩小 */
    width: 90px;
    /* 按钮宽度 */
    height: 70px;
    /* 按钮高度 */

    /* 颜色：使用主页标志性的粉色 */
    background-color: #fec5fb;

    /* 🛠️ 核心：左边是半圆（值等于高度的一半），右边靠墙是直角(0) */
    border-top-left-radius: 35px;
    border-bottom-left-radius: 35px;
    border-top-right-radius: 0px;
    border-bottom-right-radius: 0px;

    /* 给左边和上下加一圈好看的粉色霓虹阴影，右边贴墙不需要阴影 */
    box-shadow: -5px 5px 15px rgba(254, 197, 251, 0.6);

    /* 内部元素居中 */
    display: flex;
    justify-content: center;
    align-items: center;

    text-decoration: none;
    z-index: 999;
    cursor: pointer;

    /* 隐藏与显示动画 */
    opacity: 0;
    pointer-events: none;
    /* 移动端平滑过渡，同时加上位移过渡 */
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* 用纯 CSS 伪元素画出一个带“小尾巴”的精致白色标准箭头 ⬆️ */
  .back-to-top::before {
    content: '';
    width: 14px;
    height: 14px;
    /* 通过旋转折线，做出一个高精度的 V 字反转（箭头顶） */
    border-top: 5px solid #ffffff;
    border-left: 5px solid #ffffff;
    transform: rotate(45deg) translate(2px, 2px);
    position: absolute;
  }

  .back-to-top::after {
    content: '';
    width: 5px;
    height: 18px;
    background-color: #ffffff;
    /* 箭头的尾巴杆子 */
    position: absolute;
    transform: translateY(6px);
  }


  /* 当页面下滑时，由 JS 加上这个类名来显示按钮 */
  .back-to-top.show {
    opacity: 1;
    pointer-events: auto;
  }
</style>

  <script>
    const backToTopBtn = document.getElementById('backToTop');

    // 监听网页滚动事件
    window.addEventListener('scroll', () => {
      // 当页面向下滚动超过 400 像素时，显示按钮；否则隐藏
      if (window.scrollY > 400) {
        backToTopBtn.classList.add('show');
      } else {
        backToTopBtn.classList.remove('show');
      }
    });

    // 点击按钮时的平滑滚动效果
    backToTopBtn.addEventListener('click', (e) => {
      e.preventDefault(); // 阻止默认的链接跳转行为
      window.scrollTo({
        top: 0,
        behavior: 'smooth' // 丝滑滚动回顶部
      });
    });
  </script>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>关于我们</title>
<style>
  /* 基础复位：消除网页边缘空白，防止出现多余的滚动条 */
  body {
    margin: 0;
    padding: 0;
    background-color: #fec5fb; /* 可以换成你喜欢的背景底色 */
  }

  /* 现代图片容器 */
  .page-container {
    width: 100%;
    max-width: 1920px; /* 最大不超过原图设计宽度 */
    margin: 0 auto;    /* 屏幕超级大时居中显示 */
  }

  /* 核心：让图片随容器宽度 100% 缩放，高度等比例自动调整 */
  .page-container img {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>

<body>

  <div class="page-container">
    <img src="images/二级页面_01.jpg" alt="关于我们-上半部分"/>
    <img src="images/二级页面_02.jpg" alt="关于我们-下半部分"/>
  </div>

</body>
</html>
